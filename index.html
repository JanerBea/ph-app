<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Péndulo Hebreo — Biblioteca v8</title>
<style>
:root{
  --az:#1a2f5a;--az2:#2c4a7c;--az3:#d6e4f0;--az4:#eef4fa;--az5:#f5f9fe;
  --ah:#b71c1c;--h:#1b5e20;--inf:#4a148c;
  --ah-bg:#ffebee;--h-bg:#e8f5e9;--inf-bg:#f3e5f5;
  --bg:#f0f4f8;--white:#fff;--border:#dde3eb;
  --txt:#1a202c;--txt2:#4a5568;--txt3:#8896a8;
  --gold:#c8a84b;--shadow:0 1px 3px rgba(0,0,0,.1);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  font-size:15px; color:var(--txt);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);min-height:100vh}

/* ─── NAV ─── */
nav{background:var(--az);display:flex;position:sticky;top:0;z-index:200;
     box-shadow:0 2px 8px rgba(0,0,0,.3)}
.nb{flex:1;padding:11px 2px 7px;border:none;background:none;color:rgba(255,255,255,.45);
     font-size:10px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;
     align-items:center;gap:2px;border-bottom:3px solid transparent;letter-spacing:.4px;
     text-transform:uppercase;transition:color .15s}
.nb.on{color:#fff;border-bottom-color:var(--gold)}
.nb .ic{font-size:20px;line-height:1}

/* ─── SCREENS ─── */
.scr{display:none;padding:12px 12px 90px;max-width:700px;margin:0 auto}
.scr.on{display:block}

/* ─── SEARCH BAR ─── */
.sb{position:relative;margin-bottom:12px}
.sb input{width:100%;padding:13px 44px 13px 46px;border:1.5px solid var(--border);
          border-radius:14px;font-size:15px;background:var(--white);color:var(--txt);
          outline:none;transition:border .2s;-webkit-appearance:none;box-shadow:var(--shadow)}
.sb input:focus{border-color:var(--az2);box-shadow:0 0 0 3px var(--az4)}
.sb .si{position:absolute;left:14px;top:50%;transform:translateY(-50%);
         font-size:18px;color:var(--txt3);pointer-events:none}
.sb .sx{position:absolute;right:12px;top:50%;transform:translateY(-50%);
         font-size:17px;color:var(--txt3);cursor:pointer;display:none;
         background:none;border:none;padding:4px;line-height:1}

/* ─── CHIPS ─── */
.chips{display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;padding-bottom:2px;
        -webkit-overflow-scrolling:touch;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);
       background:var(--white);font-size:12px;font-weight:600;cursor:pointer;
       color:var(--txt2);transition:all .15s;white-space:nowrap;flex-shrink:0;
       box-shadow:var(--shadow)}
.chip.on{background:var(--az);color:#fff;border-color:var(--az)}

/* ─── BADGES ─── */
.badge{font-size:9px;font-weight:800;padding:2px 7px;border-radius:6px;
        letter-spacing:.4px;text-transform:uppercase;white-space:nowrap}
.bESENCIAL{background:#e3f2fd;color:#1565c0}
.bSUPERIOR{background:#e8f5e9;color:#1b5e20}
.bPLANTAS{background:#f9fbe7;color:#558b2f}
.bBOTIQUÍN{background:#ede7f6;color:#4527a0}
.bPAREJA{background:#fce4ec;color:#880e4f}
.bADN{background:#e0f7fa;color:#00695c}
.bPINEAL{background:#e8eaf6;color:#283593}
.bLOGRO{background:#fbe9e7;color:#bf360c}
.bQE{background:#e0f2f1;color:#00695c}
.bARCÁNGELES{background:#fff8e1;color:#bf8e00}
.bCUERPO{background:#f3e5f5;color:#6a1b9a}

/* ─── DIR PILLS ─── */
.dp{font-size:9px;font-weight:800;padding:2px 7px;border-radius:6px;flex-shrink:0;letter-spacing:.3px}
.dAH{background:var(--ah-bg);color:var(--ah)}
.dH{background:var(--h-bg);color:var(--h)}
.dINFINITOS{background:var(--inf-bg);color:var(--inf)}

/* ─── CARDS DE PROTOCOLO ─── */
.pcard{background:var(--white);border-radius:16px;border:1px solid var(--border);
        margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow)}
.ph{padding:13px 15px;display:flex;gap:10px;align-items:flex-start;cursor:pointer}
.pm{flex:1;min-width:0}
.pt{font-size:14px;font-weight:700;color:var(--txt);line-height:1.3}
.ps{font-size:11px;color:var(--txt3);margin-top:3px;display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.pr{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.arr{font-size:18px;color:var(--txt3);transition:transform .2s;line-height:1}
.pcard.on .arr{transform:rotate(90deg)}
.pb{display:none;padding:0 15px 15px;border-top:1px solid var(--az5)}
.pcard.on .pb{display:block}

/* ─── FILAS DE ETIQUETA EN PROTOCOLO ─── */
.er{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid #f0f4f8}
.er:last-child{border-bottom:none}
.en{width:20px;text-align:right;color:var(--txt3);flex-shrink:0;font-size:11px;padding-top:1px}
.ei{flex:1;min-width:0}
.et{font-size:13px;font-weight:600;color:var(--txt)}
.ed{font-size:11px;color:var(--txt3);margin-top:2px;line-height:1.3}

/* ─── CARDS DE ETIQUETA ─── */
.ecard{background:var(--white);border-radius:14px;border:1px solid var(--border);
        margin-bottom:8px;overflow:hidden;box-shadow:var(--shadow)}
.eh{padding:11px 13px;display:flex;align-items:center;gap:9px;cursor:pointer}
.en2{font-size:14px;font-weight:600;color:var(--txt);flex:1;line-height:1.3}
.ec{font-size:11px;color:var(--txt3);font-weight:600;flex-shrink:0}
.eb{display:none;border-top:1px solid var(--az5)}
.ecard.on .eb{display:block}
.ecard.on .arr{transform:rotate(90deg)}

/* ─── PROTOCOLO MINI (dentro de etiqueta) ─── */
.pmini{padding:10px 13px;border-bottom:1px solid #f0f4f8;display:flex;gap:9px;
        align-items:flex-start;cursor:pointer;transition:background .1s}
.pmini:last-child{border-bottom:none}
.pmini:active{background:var(--az5)}
.pmin{flex:1;min-width:0}
.pmn{font-size:13px;font-weight:700;color:var(--az2);line-height:1.3}
.pmf{font-size:11px;color:var(--txt3);margin-top:2px;display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.pmd{font-size:11px;color:var(--txt2);margin-top:4px;line-height:1.3;
      background:#f0f4f8;border-radius:6px;padding:4px 8px}
.pmr{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.pmo{font-size:10px;color:var(--txt3)}

/* ─── SESIÓN ─── */
.shdr{background:var(--az);color:#fff;border-radius:16px;padding:16px;margin-bottom:12px;
       box-shadow:0 2px 8px rgba(26,47,90,.4)}
.stit{font-size:17px;font-weight:800;line-height:1.2}
.sfuente{font-size:11px;opacity:.65;margin-top:3px}
.smeta{font-size:12px;opacity:.75;margin-top:8px}
.spbar{height:5px;background:rgba(255,255,255,.2);border-radius:3px;margin-top:8px}
.spfill{height:100%;background:var(--gold);border-radius:3px;transition:width .4s}
.scard{background:var(--white);border-radius:14px;border:1px solid var(--border);
        margin-bottom:8px;display:flex;gap:11px;align-items:flex-start;
        padding:12px 13px;transition:opacity .3s;box-shadow:var(--shadow)}
.scard.done{opacity:.3}
.sck{width:30px;height:30px;border-radius:50%;border:2px solid var(--az3);display:flex;
      align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;
      color:var(--az2);font-size:14px;transition:all .2s;background:var(--white)}
.sck.on{background:var(--az2);color:#fff;border-color:var(--az2)}
.sname{font-size:14px;font-weight:700;color:var(--txt)}
.swhere{font-size:12px;color:var(--txt3);margin-top:4px;line-height:1.4}
.done-msg{background:#e8f5e9;border-radius:14px;padding:20px;text-align:center;
           color:#1b5e20;font-size:15px;font-weight:700;margin-bottom:12px}

/* ─── CONSTRUCTOR IA ─── */
.ciw{background:var(--white);border-radius:16px;border:1px solid var(--border);
      overflow:hidden;margin-bottom:12px;box-shadow:var(--shadow)}
.cih{padding:15px 16px;background:var(--az);color:#fff;display:flex;align-items:center;gap:10px}
.cii{font-size:22px}
.cit{font-size:15px;font-weight:800}
.cis{font-size:11px;opacity:.7;margin-top:2px}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:13px}
.sbtn{padding:11px 10px;border:2px solid var(--border);border-radius:13px;background:var(--white);
       font-size:12px;font-weight:700;cursor:pointer;color:var(--txt2);text-align:center;
       transition:all .15s;line-height:1.3}
.sbtn.on{background:var(--az4);border-color:var(--az2);color:var(--az)}
.sbtn:active{transform:scale(.97)}
.gbtn{width:calc(100% - 28px);margin:0 14px 14px;padding:13px;background:var(--az2);
       color:#fff;border:none;border-radius:13px;font-size:14px;font-weight:800;
       cursor:pointer;transition:all .15s}
.gbtn:disabled{opacity:.35;cursor:not-allowed}
.gbtn:not(:disabled):active{opacity:.85;transform:scale(.98)}

/* ─── RESULTADO CONSTRUCTOR ─── */
.rw{border-radius:16px;overflow:hidden;border:2px solid var(--az3);margin-bottom:12px;box-shadow:var(--shadow)}
.rh{background:var(--az2);color:#fff;padding:13px 15px;font-size:13px;font-weight:800}
.rs{padding:11px 14px;border-bottom:1px solid var(--az4)}
.rs:last-child{border-bottom:none}
.rst{font-size:10px;font-weight:800;color:var(--txt3);text-transform:uppercase;
      letter-spacing:.5px;margin-bottom:9px}
.rec{display:flex;align-items:flex-start;gap:8px;padding:6px 0;
      border-bottom:1px solid #f0f4f8}
.rec:last-child{border-bottom:none}
.rn{font-size:13px;font-weight:600;color:var(--txt)}
.rr{font-size:11px;color:var(--az2);margin-top:2px}
.achip{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;
        background:#fff8e1;border:1.5px solid #ffe082;border-radius:18px;
        font-size:11px;font-weight:700;color:#bf8e00;margin:3px 3px 3px 0}
.pchip{display:inline-flex;align-items:center;padding:4px 9px;
        background:#f9fbe7;border:1.5px solid #c5e1a5;border-radius:18px;
        font-size:11px;font-weight:600;color:#558b2f;margin:3px 3px 3px 0}
.prec{background:var(--az5);border:1.5px solid var(--az3);border-radius:12px;
       padding:11px;margin-bottom:7px;cursor:pointer;transition:all .15s}
.prec:active{background:var(--az3)}
.precp{font-size:13px;font-weight:700;color:var(--az)}
.precm{font-size:11px;color:var(--az2);margin-top:3px;display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.iniBtn{width:100%;padding:13px;background:var(--az2);color:#fff;border:none;
         border-radius:13px;font-size:14px;font-weight:800;cursor:pointer;margin-top:6px}
.iniBtn:active{opacity:.85}

/* ─── UTILS ─── */
.cbar{font-size:11px;color:var(--txt3);margin-bottom:9px;padding-left:1px}
.abtn{flex:1;padding:10px 8px;border-radius:12px;border:1.5px solid var(--az2);
       background:var(--white);color:var(--az2);font-size:12px;font-weight:700;
       cursor:pointer;text-align:center;transition:all .15s}
.abtn:active{opacity:.7;transform:scale(.97)}
.abtn.pri{background:var(--az2);color:#fff}
.arow{display:flex;gap:8px;margin-top:13px}
.empty{text-align:center;padding:44px 16px;color:var(--txt3);font-size:14px;line-height:1.7}
.eic{font-size:36px;margin-bottom:10px}
.stit2{font-size:11px;font-weight:800;color:var(--txt3);text-transform:uppercase;
        letter-spacing:.6px;margin:14px 0 8px;padding-left:2px}
.newbadge{background:#fff3e0;color:#e65100;font-size:9px;font-weight:800;
           padding:2px 6px;border-radius:5px;letter-spacing:.3px;margin-left:4px}
</style>
</head>
<body>

<nav>
  <button class="nb on" onclick="goto('buscar',this)"><span class="ic">🔍</span>Buscar</button>
  <button class="nb" onclick="goto('constructor',this)"><span class="ic">🧠</span>Crear IA</button>
  <button class="nb" onclick="goto('etiquetas',this)"><span class="ic">🏷️</span>Etiquetas</button>
  <button class="nb" onclick="goto('sesion',this)"><span class="ic">▶️</span>Sesión</button>
</nav>

<!-- ══ BUSCAR ══ -->
<div id="scr-buscar" class="scr on">
  <div class="sb">
    <span class="si">🔍</span>
    <input id="qp" type="search" placeholder="Buscar protocolo, tema o situación..." oninput="fProtos()" autocomplete="off">
    <button class="sx" id="xp" onclick="clr('qp','xp',fProtos)">✕</button>
  </div>
  <div class="chips" id="tchips"></div>
  <div class="cbar" id="pcnt"></div>
  <div id="plist"></div>
</div>

<!-- ══ CONSTRUCTOR IA ══ -->
<div id="scr-constructor" class="scr">
  <div class="ciw">
    <div class="cih"><span class="cii">🧠</span><div><div class="cit">Constructor inteligente</div><div class="cis">Selecciona lo que quieres trabajar · te genero el protocolo con las mejores etiquetas</div></div></div>
    <div class="sgrid" id="sgrid"></div>
    <button class="gbtn" id="gbtn" onclick="generar()" disabled>Generar protocolo personalizado</button>
  </div>
  <div id="rcon"></div>
</div>

<!-- ══ ETIQUETAS ══ -->
<div id="scr-etiquetas" class="scr">
  <div class="sb">
    <span class="si">🏷️</span>
    <input id="qe" type="search" placeholder="Buscar etiqueta... ver en qué protocolo/curso aparece" oninput="fEts()" autocomplete="off">
    <button class="sx" id="xe" onclick="clr('qe','xe',fEts)">✕</button>
  </div>
  <div class="chips">
    <div class="chip on" onclick="sDir('TODOS',this)">Todas</div>
    <div class="chip" onclick="sDir('AH',this)" style="color:var(--ah)">AH · Eliminar</div>
    <div class="chip" onclick="sDir('H',this)" style="color:var(--h)">H · Integrar</div>
    <div class="chip" onclick="sDir('INFINITOS',this)" style="color:var(--inf)">∞ Fortalecer</div>
  </div>
  <div class="cbar" id="ecnt"></div>
  <div id="elist"></div>
</div>

<!-- ══ SESIÓN ══ -->
<div id="scr-sesion" class="scr">
  <div id="semp">
    <div class="empty"><div class="eic">▶️</div>Abre un protocolo desde<br><strong>Buscar</strong> o <strong>Crear IA</strong><br>y pulsa <em>"Iniciar sesión"</em></div>
  </div>
  <div id="scon" style="display:none"></div>
</div>

<script>

function bg(f){
  if(f.includes('Arcángeles'))return'ARCÁNGELES';
  if(f.includes('Superior'))return'SUPERIOR';
  if((f.includes('Botica')||f.includes('Plantas'))&&!f.includes('Botiquín'))return'PLANTAS';
  if(f.includes('Botiquín'))return'BOTIQUÍN';
  if(f.includes('Pareja'))return'PAREJA';
  if(f.includes('ADN')||f.includes('Capas'))return'ADN';
  if(f.includes('Pineal'))return'PINEAL';
  if(f.includes('Logro'))return'LOGRO';
  if(f.includes('Cuerpo'))return'CUERPO';
  if(f.includes('QE')||f.includes('Membresía'))return'QE';
  return'ESENCIAL';
}

function initTChips(){
  const c=document.getElementById('tchips');

}
function sTema(t,el){cTema=t;document.querySelectorAll('#tchips .chip').forEach(c=>c.classList.remove('on'));el.classList.add('on');fProtos();}

function fProtos(){
  const q=document.getElementById('qp').value.toLowerCase().trim();
  document.getElementById('xp').style.display=q?'block':'none';
  const L=D.protocolos.filter(p=>{
    if(cTema&&p.tema!==cTema)return false;
    if(!q)return true;
    return p.nombre.toLowerCase().includes(q)||p.para_que.toLowerCase().includes(q)||p.cuando.toLowerCase().includes(q)||p.tema.toLowerCase().includes(q);
  });
  document.getElementById('pcnt').textContent=`${L.length} protocolo${L.length!==1?'s':''}`;
  document.getElementById('plist').innerHTML=L.length?L.map(p=>rPcard(p)).join(''):`<div class="empty"><div class="eic">🔍</div>Sin resultados</div>`;
}

function rPcard(p){
  const b=bg(p.fuente),em=E[p.tema]||'📌';
  const isNew=p.fuente.includes('2026')||p.fuente.includes('Arcángeles')||p.fuente.includes('Cuerpo');
  return`<div class="pcard" id="pc-${p.id}">
    <div class="ph" onclick="tPC('${p.id}')">
      <div class="pm">
        <div class="pt">${p.nombre}${isNew?'<span class="newbadge">NUEVO</span>':''}</div>
        <div class="ps">${em} ${p.tema} · ${p.n} etiquetas</div>
      </div>
      <div class="pr">${sB(b)}<span class="arr">›</span></div>
    </div>

      ${p.para_que?`<p style="font-size:13px;color:var(--txt);margin:11px 0 6px;line-height:1.5">${p.para_que}</p>`:''}
      ${p.cuando?`<p style="font-size:12px;color:var(--txt3);margin-bottom:11px;line-height:1.4"><strong style="color:var(--txt2)">Cuándo:</strong> ${p.cuando}</p>`:''}

      ${(p.etiquetas||[]).map((e,i)=>`
        <div class="er">
          <span class="en">${i+1}</span>${sD(e.dir)}
          <div class="ei"><div class="et">${e.texto}</div>${e.donde?`<div class="ed">📍 ${e.donde}</div>`:''}</div>
        </div>`).join('')}
      <div class="arow">
        <button class="abtn pri" onclick="event.stopPropagation();iSes('${p.id}',null)">▶ Iniciar sesión</button>
      </div>
    </div>
  </div>`;
}
function tPC(id){document.getElementById('pc-'+id)?.classList.toggle('on');}

/* ── ETIQUETAS ── */
function sDir(d,el){cDir=d;document.querySelectorAll('#scr-etiquetas .chips .chip').forEach(c=>c.classList.remove('on'));el.classList.add('on');fEts();}

function fEts(){
  const q=document.getElementById('qe').value.toLowerCase().trim();
  document.getElementById('xe').style.display=q?'block':'none';
  let L=D.etiquetas;
  if(cDir!=='TODOS')L=L.filter(e=>e.dir===cDir);
  if(q)L=L.filter(e=>e.nombre.toLowerCase().includes(q));
  const show=L.slice(0,100);
  document.getElementById('ecnt').textContent=q?`${L.length} resultado${L.length!==1?'s':''} · toca para ver en qué protocolo y curso aparece`:`${L.length} etiquetas${L.length>100?' · Escribe para filtrar':''}`;
  document.getElementById('elist').innerHTML=show.length?show.map(e=>rEcard(e)).join(''):`<div class="empty">Sin resultados</div>`;
}

function rEcard(e){
  const n=e.protos.length;
  const protosHtml=e.protos.map(p=>{
    const b=bg(p.fuente);
    const sf=p.fuente.includes('QE')||p.fuente.includes('Membresía')?p.fuente.replace('QE Membresía ','QE '):
             p.fuente.length>30?p.fuente.substring(0,28)+'…':p.fuente;
    return`<div class="pmini" onclick="abrirDesdEt('${encodeURIComponent(p.proto)}')">
      <div class="pmin">
        <div class="pmn">${p.proto}</div>
        <div class="pmf">${sB(b)}<span>${sf}</span></div>
        ${p.donde?`<div class="pmd">📍 ${p.donde}</div>`:''}
      </div>
      <div class="pmr">
        ${sD(p.dir)}
        ${p.orden?`<span class="pmo">nº${p.orden}</span>`:''}
      </div>
    </div>`;
  }).join('');
  return`<div class="ecard" id="ec-${e.id}">
    <div class="eh" onclick="tEC('${e.id}')">
      ${sD(e.dir)}
      <span class="en2">${e.nombre}</span>
      <span class="ec">${n} proto${n!==1?'s':''}</span>
      <span class="arr" style="font-size:16px">›</span>
    </div>
    <div class="eb">
      ${n===0?'<div style="padding:11px 13px;font-size:13px;color:var(--txt3)">No aparece en ningún protocolo registrado</div>'
        :`<div style="font-size:10px;font-weight:800;color:var(--txt3);letter-spacing:.5px;padding:8px 13px 4px;text-transform:uppercase">Aparece en ${n} protocolo${n!==1?'s':''}</div>${protosHtml}`}
    </div>
  </div>`;
}
function tEC(id){document.getElementById('ec-'+id)?.classList.toggle('on');}

function abrirDesdEt(enc){
  const nombre=decodeURIComponent(enc);
  const proto=D.protocolos.find(p=>p.nombre===nombre);
  if(!proto)return;
  cTema='';
  document.querySelectorAll('#tchips .chip').forEach(c=>c.classList.remove('on'));
  document.querySelector('#tchips .chip')?.classList.add('on');
  document.getElementById('qp').value=nombre;
  document.getElementById('xp').style.display='block';
  fProtos();
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('scr-buscar').classList.add('on');
  document.querySelectorAll('.nb')[0].classList.add('on');
  setTimeout(()=>{
    const card=document.getElementById('pc-'+proto.id);
    if(card){card.classList.add('on');card.scrollIntoView({behavior:'smooth',block:'start'});}
  },150);
}

const SINT=Object.keys(D.conocimiento);
function initSin(){
  document.getElementById('sgrid').innerHTML=SINT.map((k,i)=>
    `<button class="sbtn" onclick="tSin('${k}',this)">${D.conocimiento[k].label}</button>`
  ).join('');

function tSin(k,el){
  el.classList.toggle('on');selSin.has(k)?selSin.delete(k):selSin.add(k);
  document.getElementById('gbtn').disabled=selSin.size===0;
  if(selSin.size===0)document.getElementById('rcon').innerHTML='';
}
function generar(){
  if(!selSin.size)return;
  const mL=new Map(),mI=new Map();
  const arcs=new Set(),plts=new Set(),precs=new Set();
  selSin.forEach(k=>{
    const info=D.conocimiento[k];
    (info.limpiar||[]).forEach(([n,d,r])=>{if(!mL.has(n))mL.set(n,{d,r,s:[]});mL.get(n).s.push(info.label);});
    (info.integrar||[]).forEach(([n,d,r])=>{if(!mI.has(n))mI.set(n,{d,r,s:[]});mI.get(n).s.push(info.label);});
    (info.arcangelico||[]).forEach(a=>arcs.add(a));
    (info.plantas||[]).forEach(p=>plts.add(p));
    (info.proto_rec||[]).forEach(p=>precs.add(p));
  });
  const sortF=m=>Array.from(m.entries()).sort((a,b)=>b[1].s.length-a[1].s.length).slice(0,8);
  const limpiar=sortF(mL),integrar=sortF(mI);
  prCust={id:'CUSTOM',nombre:'Protocolo personalizado ✨',tema:'Personalizado',fuente:'Constructor IA',n:limpiar.length+integrar.length,
    etiquetas:[...limpiar.map(([n,{d,r}])=>(({texto:n,dir:d,donde:r}))),
               ...integrar.map(([n,{d,r}])=>(({texto:n,dir:d,donde:r})))]};
  const protos=Array.from(precs).map(n=>D.protocolos.find(p=>p.nombre===n)).filter(Boolean);
  const labs=Array.from(selSin).map(k=>D.conocimiento[k].label).join(', ');
  document.getElementById('rcon').innerHTML=`
    <div class="rw">
      <div class="rh">Para: ${labs}</div>
      <div class="rs">
        <div class="rst">🔴 Fase 1 — Limpiar · AH · Antihorario (${limpiar.length} etiquetas)</div>
        ${limpiar.map(([n,{d,r}])=>`<div class="rec">${sD('AH')}<div><div class="rn">${n}</div><div class="rr">${r}</div></div></div>`).join('')}
      </div>
      <div class="rs">
        <div class="rst">🟢 Fase 2 — Integrar · H · Horario (${integrar.length} etiquetas)</div>
        ${integrar.map(([n,{d,r}])=>`<div class="rec">${sD('H')}<div><div class="rn">${n}</div><div class="rr">${r}</div></div></div>`).join('')}
      </div>
      ${arcs.size?`<div class="rs"><div class="rst">😇 Arcángeles complementarios</div><div style="padding:4px 0">${Array.from(arcs).map(a=>`<span class="achip">👼 ${a}</span>`).join('')}</div><p style="font-size:11px;color:var(--txt3);margin-top:7px">Añade estos arcángeles (H) al final del protocolo</p></div>`:''}
      ${plts.size?`<div class="rs"><div class="rst">🌿 Plantas de Poder sugeridas</div><div style="padding:4px 0">${Array.from(plts).map(p=>`<span class="pchip">🌿 ${p.replace('Fórmula ','')}</span>`).join('')}</div><p style="font-size:11px;color:var(--txt3);margin-top:7px">Aplica estas fórmulas (H) 30 seg en Cabeza, Corazón, Hígado, Ch1 y pies</p></div>`:''}
      ${protos.length?`<div class="rs"><div class="rst">📋 Protocolos completos recomendados</div>${protos.map(p=>`<div class="prec" onclick="abrirProto('${p.id}')"><div class="precp">${p.nombre}</div><div class="precm">${sB(bg(p.fuente))} ${p.tema} · ${p.n} etiq.</div></div>`).join('')}</div>`:''}
    </div>
    <button class="iniBtn" onclick="iSes(null,prCust)">▶ Iniciar sesión con este protocolo</button>`;
}

function abrirProto(id){
  const p=D.protocolos.find(x=>x.id===id);if(!p)return;
  cTema='';document.querySelectorAll('#tchips .chip').forEach(c=>c.classList.remove('on'));
  document.querySelector('#tchips .chip')?.classList.add('on');
  document.getElementById('qp').value=p.nombre;fProtos();
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('scr-buscar').classList.add('on');
  document.querySelectorAll('.nb')[0].classList.add('on');
  setTimeout(()=>{const card=document.getElementById('pc-'+id);if(card){card.classList.add('on');card.scrollIntoView({behavior:'smooth',block:'start'});}},150);
}

  con.innerHTML=`
    <div class="shdr">
      <div class="stit">${sesPr.nombre}</div>
      <div class="sfuente">${isCust?'✨ Protocolo personalizado':sesPr.fuente} ${isCust?'':sB(b)}</div>
      <div class="smeta">${done}/${tot} completadas · ${pct}%</div>
      <div class="spbar"><div class="spfill" style="width:${pct}%"></div></div>
    </div>
    ${done===tot&&tot>0?'<div class="done-msg">✓ ¡Sesión completada!</div>':''}
    ${sesPr.etiquetas.map((e,i)=>`
      <div class="scard ${sesDone.has(i)?'done':''}" id="sc-${i}">
        <div class="sck ${sesDone.has(i)?'on':''}" onclick="tDone(${i})">${sesDone.has(i)?'✓':''}</div>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">
            <span style="font-size:11px;color:var(--txt3)">${i+1}.</span>
            ${sD(e.dir)}<span class="sname">${e.texto}</span>
          </div>
          ${e.donde?`<div class="swhere">📍 ${e.donde}</div>`:''}
        </div>
      </div>`).join('')}
    <button class="abtn" style="width:100%;margin-top:10px" onclick="sesPr=null;sesDone=new Set();rSes()">↩ Nueva sesión</button>`;
}
function tDone(i){sesDone.has(i)?sesDone.delete(i):sesDone.add(i);rSes();}

/* ── INIT ── */
initTChips();fProtos();
initSin();
fEts();
</script>
</body>
